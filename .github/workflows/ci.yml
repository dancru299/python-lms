name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall chạy `prisma generate` (không cần DB).
      - name: Install dependencies
        run: npm ci

      # --- Các bước chặn (fail CI nếu lỗi) ---
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # --- Non-blocking: còn lỗi lint tồn đọng, dọn dần ---
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
